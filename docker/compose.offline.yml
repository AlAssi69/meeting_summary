services:
  meeting-assistant-gpu:
    image: meeting-assistant:gpu-offline
    container_name: meeting-assistant-gpu
    environment:
      MEETING_ASSISTANT_OLLAMA_BASE_URL: ${MEETING_ASSISTANT_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      MEETING_ASSISTANT_OLLAMA_MODEL: ${MEETING_ASSISTANT_OLLAMA_MODEL:-gemma4:e4b128k}
      MEETING_ASSISTANT_WHISPER_DEVICE: cuda
      MEETING_ASSISTANT_WHISPER_MODEL: ${MEETING_ASSISTANT_WHISPER_MODEL:-large-v3}
      MEETING_ASSISTANT_SPEAKER_DIARIZATION: ${MEETING_ASSISTANT_SPEAKER_DIARIZATION:-0}
      DISPLAY: ${DISPLAY:-:0}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/mnt/wslg/runtime-dir}
      PULSE_SERVER: ${PULSE_SERVER:-/mnt/wslg/PulseServer}
    volumes:
      - meeting_assistant_data:/opt/meeting-assistant/data
      - meeting_assistant_outputs:/opt/meeting-assistant/meeting_outputs
      - meeting_assistant_whisper:/opt/meeting-assistant/models/whisper
      - meeting_assistant_hf:/opt/meeting-assistant/models/hf
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /mnt/wslg:/mnt/wslg
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true

  meeting-assistant-cpu:
    image: meeting-assistant:cpu-offline
    container_name: meeting-assistant-cpu
    environment:
      MEETING_ASSISTANT_OLLAMA_BASE_URL: ${MEETING_ASSISTANT_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      MEETING_ASSISTANT_OLLAMA_MODEL: ${MEETING_ASSISTANT_OLLAMA_MODEL:-gemma4:e4b128k}
      MEETING_ASSISTANT_WHISPER_DEVICE: cpu
      MEETING_ASSISTANT_WHISPER_MODEL: ${MEETING_ASSISTANT_WHISPER_MODEL:-large-v3}
      MEETING_ASSISTANT_SPEAKER_DIARIZATION: ${MEETING_ASSISTANT_SPEAKER_DIARIZATION:-0}
      DISPLAY: ${DISPLAY:-:0}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/mnt/wslg/runtime-dir}
      PULSE_SERVER: ${PULSE_SERVER:-/mnt/wslg/PulseServer}
    volumes:
      - meeting_assistant_data:/opt/meeting-assistant/data
      - meeting_assistant_outputs:/opt/meeting-assistant/meeting_outputs
      - meeting_assistant_whisper:/opt/meeting-assistant/models/whisper
      - meeting_assistant_hf:/opt/meeting-assistant/models/hf
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /mnt/wslg:/mnt/wslg
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

volumes:
  meeting_assistant_data:
  meeting_assistant_outputs:
  meeting_assistant_whisper:
  meeting_assistant_hf:
