# GPU override: layer on top of compose.yml to switch WhisperX to the CUDA image and
# reserve NVIDIA GPUs for both services. Requires NVIDIA Container Toolkit on the host.
#   docker compose -f compose.yml -f compose.gpu.yml up -d
services:
  whisper:
    image: meeting-assistant:gpu-bundle
    environment:
      MEETING_ASSISTANT_WHISPER_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
