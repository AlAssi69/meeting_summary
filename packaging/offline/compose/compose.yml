# Base (CPU-safe) profile: WhisperX inference API + offline Ollama summarization.
# Run on CPU:  docker compose -f compose.yml up -d
# Run on GPU:  docker compose -f compose.yml -f compose.gpu.yml up -d
services:
  whisper:
    image: meeting-assistant:cpu-bundle
    container_name: meeting-assistant-whisper
    ports:
      - "${WHISPER_API_PORT:-18080}:18080"
    environment:
      MEETING_ASSISTANT_OFFLINE_BUNDLE: "1"
      MEETING_ASSISTANT_SPEAKER_DIARIZATION: "0"
      MEETING_ASSISTANT_WHISPER_MODEL: ${MEETING_ASSISTANT_WHISPER_MODEL:-large-v3-turbo}
      MEETING_ASSISTANT_WHISPER_ALIGN_LANGUAGE: ${MEETING_ASSISTANT_WHISPER_ALIGN_LANGUAGE:-ar}
      MEETING_ASSISTANT_WHISPER_DEVICE: cpu
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      WHISPER_API_PORT: "18080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  ollama:
    image: meeting-assistant:ollama-bundle
    container_name: meeting-assistant-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - meeting_assistant_ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  meeting_assistant_ollama:
